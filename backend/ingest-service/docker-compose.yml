# Własny compose tylko dla ingest-service.
# WAŻNE: Sieć "fraudlens" musi istnieć. Najpierw uruchom infrastrukturę:
#   cd backend  &&  docker compose up -d
# Dopiero potem (w drugim terminalu):
#   cd backend/ingest-service  &&  docker compose up --build

services:
  ingest-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: ingest-service:latest
    container_name: ingest-service
    ports:
      - "8080:8080"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - fraudlens

networks:
  fraudlens:
    external: true  # sieć tworzona przez: cd backend && docker compose up -d
