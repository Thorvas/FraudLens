# AI Analysis Service – Kafka consumer (listens for events, writes to SQLite).
# Requires the shared "fraudlens" network and Kafka. Start infrastructure first:
#   cd backend  &&  docker compose up -d
# Then run (from this directory):
#   docker compose up --build

services:
  ai-analysis-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-analysis-service:latest
    container_name: ai-analysis-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    # Optional: persist DB and model (create ./data on host first)
    # volumes:
    #   - ./data:/app/data
    networks:
      - fraudlens

networks:
  fraudlens:
    external: true
