# Tylko infrastruktura współdzielona (Kafka).
# Uruchom NAJPIERW (tworzy sieć "fraudlens" i startuje Kafkę):
#   cd backend  &&  docker compose up -d
# Potem możesz uruchamiać mikroserwisy (np. cd ingest-service && docker compose up --build).
#
# Aby uruchomić wszystko razem (Kafka + ingest + ai-analysis) w jednej sieci:
#   cd backend  &&  docker compose -f docker-compose.all.yml up --build

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - fraudlens

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      # Single broker: replication factor must be 1 (default is 3)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fraudlens

networks:
  fraudlens:
    name: fraudlens
